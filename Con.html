<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Iframe Sandbox Tool</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; }
  textarea, input { width: 100%; margin-bottom: 10px; }
  textarea { height: 80px; }
  iframe { width: 100%; height: 400px; border: 1px solid #ccc; margin-top: 10px; }
</style>
</head>
<body>

<h2>Paste Iframe Code or Website Link</h2>
<textarea id="inputBox" placeholder="Paste iframe HTML or website URL here..."></textarea>
<button id="runBtn">Sandbox It</button>

<iframe id="sandboxFrame"
        sandbox="allow-scripts"
        referrerpolicy="no-referrer">
</iframe>

<script>
document.getElementById('runBtn').addEventListener('click', () => {
    const rawInput = document.getElementById('inputBox').value.trim();
    const iframe = document.getElementById('sandboxFrame');

    let url = '';

    // If input looks like an iframe HTML tag, extract src
    const iframeMatch = rawInput.match(/<iframe[^>]+src=["']([^"']+)["']/i);
    if (iframeMatch) {
        url = iframeMatch[1];
    } else {
        url = rawInput;
    }

    // Validate URL
    try {
        const parsed = new URL(url);
        iframe.removeAttribute('srcdoc');
        iframe.src = parsed.href;
    } catch {
        alert('Invalid iframe code or URL.');
    }
});
</script>

</body>
</html>
